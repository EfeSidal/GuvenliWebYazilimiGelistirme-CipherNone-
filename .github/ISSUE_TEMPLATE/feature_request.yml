name: "🚀 Feature Request"
description: "Have an idea for CipherNone? Suggest it here."
title: "[FEATURE] <Short title of the feature idea>"
labels: ["enhancement", "feature_request"]
body:
  - type: markdown
    attributes:
      value: |
        ### 👨‍🏫 CipherNone Feature Request
        Have a new AppSec scenario or a security hardening idea? Tell us about it!

  - type: textarea
    id: feature
    attributes:
      label: "Feature Description"
      description: "A clear and concise description of the new target or hardening feature."
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: "Motivation / Use Case"
      description: "Why is this feature needed for CipherNone? (e.g., educational value, specific attack vector)."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives"
      description: "What alternative solutions or workarounds have you considered?"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: "Additional Context"
      description: "Add any other context, mockup, or research link about the feature here."
    validations:
      required: false
